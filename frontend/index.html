<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>shoebox dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero__body">
          <div>
            <p class="eyebrow">Ready Plan Go</p>
            <h1>Financial extraction dashboard</h1>
          </div>
          <div class="hero__actions">
            <button id="sync-button">Sync shoebox</button>
            <span id="status" class="status-label">Loading…</span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>Summary</h2>
        </div>
        <div id="summary-grid" class="summary-grid"></div>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h2>Records</h2>
        </div>
        <div id="tabs" class="tabs"></div>
        <div class="table-wrap">
          <table class="records-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Vendor</th>
                <th>Source</th>
                <th>Method</th>
                <th class="col-amount">Amount</th>
                <th>Warnings</th>
              </tr>
            </thead>
            <tbody id="records-body"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
